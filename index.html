<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto Móvil de Publicidad (POP) - El Dorado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        
        <div class="header-bienvenida">
            <span>✈️ El Dorado • Bogotá</span>
            <h1>¡Bienvenido a la Capital!</h1>
            <p>Toca tu perfil de viajero para activar nuestras recomendaciones recomendadas para ti</p>
        </div>

        <div class="perfiles-contenedor">
            
            <button onclick="filtrarPerfil('negocios')" class="btn-perfil">
                <span class="btn-icon">💼</span>
                <div>
                    <strong class="btn-titulo">Negocios y Conexiones</strong>
                    <span class="btn-subtitulo">Zonas de Coworking, almuerzos ejecutivos y hoteles</span>
                </div>
            </button>

            <button onclick="filtrarPerfil('familia')" class="btn-perfil">
                <span class="btn-icon">👨‍👩‍👧‍👦</span>
                <div>
                    <strong class="btn-titulo">Vacaciones en Familia</strong>
                    <span class="btn-subtitulo">Parques de diversión, museos y planes familiares</span>
                </div>
            </button>

            <button onclick="filtrarPerfil('cultura')" class="btn-perfil">
                <span class="btn-icon">🥾</span>
                <div>
                    <strong class="btn-titulo">Cultura y Alrededores</strong>
                    <span class="btn-subtitulo">Museos históricos, Monserrate y pueblos coloniales</span>
                </div>
            </button>

            <button onclick="filtrarPerfil('transporte')" class="btn-perfil btn-transporte">
                <span class="btn-icon">🚕</span>
                <div>
                    <strong class="btn-titulo">Transporte Autorizado</strong>
                    <span class="btn-subtitulo">Taxis oficiales, buses y movilidad segura</span>
                </div>
            </button>

        </div>

        <div id="contenedor-recomendaciones" class="contenedor-recomendaciones">
            </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
